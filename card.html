<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A card for you &middot; lyka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --cream: #faf6f1;
        --blush: #f5e1de;
        --rose: #c4727f;
        --rose-light: #e0a8b0;
        --rose-pale: #f0d4d8;
        --sage: #9aa78f;
        --gold: #d4a574;
        --text: #4a3f3a;
        --text-light: #7a6a64;
        --text-faint: #b8a8a3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: var(--cream);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }
    body {
        min-height: 100vh; min-height: 100svh;
        background:
            radial-gradient(circle at 18% 12%, var(--blush) 0%, transparent 35%),
            radial-gradient(circle at 82% 88%, #f8d6dc 0%, transparent 38%),
            radial-gradient(circle at 50% 50%, rgba(255,250,245,0.7) 0%, transparent 60%),
            var(--cream);
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem 1rem 5rem;
        position: relative;
    }

    .back-link {
        position: absolute; top: 1.25rem; left: 1.25rem;
        display: inline-flex; align-items: center; gap: 0.4rem;
        font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
        color: var(--text-faint); text-decoration: none;
        transition: color 0.25s ease; z-index: 10;
    }
    .back-link:hover { color: var(--rose); }
    .back-link svg { width: 12px; height: 12px; }

    .header {
        text-align: center; margin-bottom: 1.5rem; max-width: 360px;
    }
    .label {
        font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase;
        color: var(--sage); margin-bottom: 0.6rem;
    }
    .heading {
        font-family: 'Cormorant Garamond', serif; font-weight: 400;
        font-size: 1.75rem; line-height: 1.25; color: var(--text);
        margin-bottom: 0.5rem;
    }
    .heading em { font-style: italic; color: var(--rose); }
    .sub {
        font-family: 'Cormorant Garamond', serif; font-style: italic;
        font-size: 0.95rem; color: var(--text-light);
    }

    /* ===== CARD STAGE ===== */
    .stage-wrap {
        width: 100%; max-width: 360px;
        margin: 1.5rem auto;
        perspective: 2200px;
        perspective-origin: 50% 30%;
    }
    .stage {
        position: relative; width: 100%; aspect-ratio: 5 / 7;
        transform-style: preserve-3d;
        transition: transform 1.1s cubic-bezier(0.65, 0, 0.35, 1);
        cursor: pointer;
    }

    /* The cover (a flip-card with front + back faces) */
    .cover {
        position: absolute; inset: 0;
        transform-style: preserve-3d;
        transform-origin: left center;
        transition: transform 1.1s cubic-bezier(0.65, 0, 0.35, 1);
        z-index: 3;
    }
    .face {
        position: absolute; inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        background-color: #fbeef0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px;
        box-shadow: 0 4px 14px rgba(196,114,127,0.15), 0 18px 50px rgba(196,114,127,0.18);
    }
    .face.front {
        background-image: url('card-cover.png');
        transform: rotateY(0);
    }
    .face.back-of-cover {
        background: linear-gradient(135deg, #fdeef0, #f8e0e6 60%, #fbe8ec);
        transform: rotateY(180deg);
        display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .back-of-cover-text {
        font-family: 'Cormorant Garamond', serif; font-style: italic;
        text-align: center; color: var(--rose); opacity: 0.4;
        font-size: 0.95rem; line-height: 1.5;
    }

    /* Inside spread 1 */
    .inside {
        position: absolute; inset: 0;
        background-color: #fbeef0;
        background-image: url('card-inside1.jpeg');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px; z-index: 2;
        opacity: 0;
        transition: opacity 0.5s ease;
        box-shadow: inset 8px 0 18px rgba(120,60,80,0.06), 0 8px 28px rgba(196,114,127,0.12);
    }

    /* Inside spread 2 */
    .inside2 {
        position: absolute; inset: 0;
        background-color: #fbeef0;
        background-image: url('card-inside2.jpeg');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px; z-index: 1;
        opacity: 0;
        transition: opacity 0.5s ease;
        box-shadow: inset 8px 0 18px rgba(120,60,80,0.06), 0 8px 28px rgba(196,114,127,0.12);
    }

    /* The back face of the card */
    .back-face {
        position: absolute; inset: 0;
        background-color: #fbeef0;
        background-image: url('card-back-face.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        transform: rotateY(180deg);
        z-index: 0;
        box-shadow: 0 4px 14px rgba(196,114,127,0.15), 0 18px 50px rgba(196,114,127,0.18);
    }

    /* Spine shadow */
    .spine {
        position: absolute; left: 0; top: 0; bottom: 0; width: 12px;
        background: linear-gradient(to right, rgba(120,60,80,0.10), rgba(120,60,80,0.04) 60%, transparent);
        z-index: 4; pointer-events: none;
        opacity: 0; transition: opacity 0.6s ease 0.4s;
    }

    /* ===== STATES ===== */

    /* front */
    .stage[data-state="front"] .cover  { transform: rotateY(0); }
    .stage[data-state="front"]         { transform: rotateY(0); }
    .stage[data-state="front"] .spine  { opacity: 0; transition-delay: 0s; }
    .stage[data-state="front"] .inside { opacity: 0; }
    .stage[data-state="front"] .inside2{ opacity: 0; }

    /* inside1 */
    .stage[data-state="inside"] .cover   { transform: rotateY(-160deg); }
    .stage[data-state="inside"]          { transform: rotateY(0); }
    .stage[data-state="inside"] .spine   { opacity: 1; }
    .stage[data-state="inside"] .inside  { opacity: 1; z-index: 2; }
    .stage[data-state="inside"] .inside2 { opacity: 0; z-index: 1; }

    /* inside2 */
    .stage[data-state="inside2"] .cover   { transform: rotateY(-160deg); }
    .stage[data-state="inside2"]          { transform: rotateY(0); }
    .stage[data-state="inside2"] .spine   { opacity: 1; }
    .stage[data-state="inside2"] .inside  { opacity: 0; z-index: 1; }
    .stage[data-state="inside2"] .inside2 { opacity: 1; z-index: 2; }

    /* closing (cover swings shut before flip) */
    .stage[data-state="closing"] .cover   { transform: rotateY(0); }
    .stage[data-state="closing"]          { transform: rotateY(0); }
    .stage[data-state="closing"] .inside  { opacity: 0; }
    .stage[data-state="closing"] .inside2 { opacity: 0; }

    /* back — hide cover so back-face image shows through */
    .stage[data-state="back"] .cover {
        transform: rotateY(0);
        /* delay opacity until card is edge-on (~halfway through flip) */
        opacity: 0;
        transition: transform 1.1s cubic-bezier(0.65, 0, 0.35, 1),
                    opacity 0s linear 0.5s;
    }
    .stage[data-state="back"] { transform: rotateY(-180deg); }

    /* ===== HINT ===== */
    .hint {
        margin-top: 1.5rem; text-align: center;
        font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
        color: var(--text-faint); min-height: 1.2em;
        transition: opacity 0.4s ease;
    }
    .hint .heart {
        display: inline-block; color: var(--rose); margin: 0 0.2em;
        animation: heartbeat 2s ease-in-out infinite;
    }
    @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.18); }
    }

    /* ===== ACTION BUTTONS (zoom + save) ===== */
    .card-actions {
        display: flex; gap: 0.6rem; justify-content: center;
        margin-top: 1rem;
        opacity: 0; pointer-events: none;
        transition: opacity 0.4s ease;
    }
    .card-actions.visible {
        opacity: 1; pointer-events: auto;
    }
    .card-action-btn {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: none;
        border: 1px solid var(--rose-pale);
        color: var(--text-light);
        font-family: 'Inter', sans-serif;
        font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
        padding: 0.5rem 0.9rem;
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s ease;
        text-decoration: none;
    }
    .card-action-btn:hover, .card-action-btn:active {
        background: var(--rose); color: var(--cream); border-color: var(--rose);
    }
    .card-action-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ===== RESET BUTTON ===== */
    .reset-btn {
        margin-top: 0.75rem;
        background: none; border: 1px solid var(--rose-pale);
        color: var(--text-light);
        font-family: 'Inter', sans-serif;
        font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
        padding: 0.55rem 1.3rem; border-radius: 100px;
        cursor: pointer; transition: all 0.25s ease;
    }
    .reset-btn:hover { background: var(--rose); color: var(--cream); border-color: var(--rose); }

    /* ===== SPARKLES ===== */
    .sparkles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .sparkle {
        position: absolute; width: 4px; height: 4px;
        background: var(--rose-light); border-radius: 50%; opacity: 0;
        animation: sparkle 3s ease-in-out infinite;
    }
    @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
        position: fixed; inset: 0;
        background: rgba(10, 8, 7, 0.96);
        z-index: 200; display: none; cursor: zoom-out;
        animation: fadeBg 0.3s ease;
    }
    .lightbox.open {
        display: flex; align-items: flex-start; justify-content: center;
        overflow: auto; padding: 1rem;
    }
    @keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }
    .lightbox img {
        max-width: 100%; width: auto; height: auto;
        display: block; margin: auto;
        box-shadow: 0 20px 80px rgba(0,0,0,0.6);
        border-radius: 4px;
        animation: zoomIn 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
    .lightbox-close {
        position: fixed; top: 1rem; right: 1rem;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #faf6f1; width: 36px; height: 36px; border-radius: 50%;
        cursor: pointer; font-size: 1.2rem; line-height: 1;
        display: flex; align-items: center; justify-content: center;
        z-index: 201; transition: all 0.2s ease;
    }
    .lightbox-close:hover { background: rgba(196,114,127,0.35); border-color: var(--rose); }


    @media (min-width: 768px) {
        .stage-wrap { max-width: 420px; }
        .heading { font-size: 2.1rem; }
    }
</style>
</head>
<body>

<a href="index.html#return" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    back home
</a>

<div class="header">
    <p class="label">a card for you</p>
    <h1 class="heading">tap to <em>open</em></h1>
    <p class="sub">tap to turn each page &middot; tap again for the back</p>
</div>

<div class="stage-wrap">
    <div class="stage" id="stage" data-state="front" role="button" tabindex="0" aria-label="Open the birthday card">
        <!-- Inside spread 2 (deepest) -->
        <div class="inside2" aria-hidden="true"></div>
        <!-- Inside spread 1 -->
        <div class="inside" aria-hidden="true"></div>
        <!-- Spine shadow -->
        <div class="spine"></div>
        <!-- Cover -->
        <div class="cover">
            <div class="face front" aria-hidden="true"></div>
            <div class="face back-of-cover" aria-hidden="true">
                <p class="back-of-cover-text">&mdash; for lyka, with love &mdash;</p>
            </div>
        </div>
        <!-- Back of card -->
        <div class="back-face" aria-hidden="true"></div>
    </div>
</div>

<p class="hint" id="hint">tap the card <span class="heart">&hearts;</span></p>

<!-- Zoom + Save buttons -->
<div class="card-actions" id="cardActions">
    <button class="card-action-btn" id="zoomBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        zoom
    </button>
    <button class="card-action-btn" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        save
    </button>
</div>

<button class="reset-btn" id="resetBtn" style="display:none;">close it</button>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-label="Card zoomed view">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close zoom">&times;</button>
    <img src="" alt="Card (full size)" id="lightboxImg">
</div>


<script>
(function() {
    'use strict';

    var stage      = document.getElementById('stage');
    var hint       = document.getElementById('hint');
    var resetBtn   = document.getElementById('resetBtn');
    var cardActions= document.getElementById('cardActions');
    var zoomBtn    = document.getElementById('zoomBtn');
    var saveBtn    = document.getElementById('saveBtn');
    var lightbox   = document.getElementById('lightbox');
    var lightboxImg= document.getElementById('lightboxImg');
    var lightboxClose = document.getElementById('lightboxClose');

    var state = 'front';
    var animating = false;
    var DURATION = 1100;
    var FADE = 550;

    var HINTS = {
        'front':   'tap the card <span class="heart">&hearts;</span>',
        'inside':  'tap to see more',
        'inside2': 'tap again for the back',
        'back':    'tap to start over'
    };

    // Maps state → image src for zoom/save
    var IMAGE_MAP = {
        'front':   'card-cover.png',
        'inside':  'card-inside1.jpeg',
        'inside2': 'card-inside2.jpeg',
        'back':    'card-back-face.png'
    };

    function setState(s) {
        state = s;
        stage.setAttribute('data-state', s);
        if (HINTS[s]) hint.innerHTML = HINTS[s];
        var isOpen = (s !== 'front');
        resetBtn.style.display = isOpen ? 'inline-block' : 'none';
        if (isOpen) {
            cardActions.classList.add('visible');
        } else {
            cardActions.classList.remove('visible');
        }
    }

    function advance() {
        if (animating) return;
        if (state === 'front') {
            animating = true;
            setState('inside');
            setTimeout(function() { animating = false; }, DURATION);
        } else if (state === 'inside') {
            animating = true;
            setState('inside2');
            setTimeout(function() { animating = false; }, FADE);
        } else if (state === 'inside2') {
            animating = true;
            stage.setAttribute('data-state', 'closing');
            hint.innerHTML = HINTS['back'];
            setTimeout(function() {
                setState('back');
                setTimeout(function() { animating = false; }, DURATION);
            }, DURATION);
        } else if (state === 'back') {
            animating = true;
            setState('front');
            setTimeout(function() { animating = false; }, DURATION);
        }
    }

    function reset() {
        if (animating) return;
        if (state !== 'front') {
            animating = true;
            setState('front');
            setTimeout(function() { animating = false; }, DURATION);
        }
    }

    stage.addEventListener('click', advance);
    stage.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); advance(); }
    });
    resetBtn.addEventListener('click', reset);

    // ── Zoom ──
    function openZoom() {
        var src = IMAGE_MAP[state] || IMAGE_MAP['front'];
        lightboxImg.src = src;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeZoom() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
        setTimeout(function() { lightboxImg.src = ''; }, 250);
    }
    zoomBtn.addEventListener('click', openZoom);
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox || e.target === lightboxImg) closeZoom();
    });
    lightboxClose.addEventListener('click', closeZoom);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('open')) closeZoom();
    });

    // ── Save ──
    saveBtn.addEventListener('click', function() {
        var src = IMAGE_MAP[state] || IMAGE_MAP['front'];
        var filename = src.split('/').pop();

        // iOS/modern: use Web Share API so she can save to Photos
        if (navigator.share) {
            fetch(src)
                .then(function(r) { return r.blob(); })
                .then(function(blob) {
                    var file = new File([blob], filename, { type: blob.type });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        return navigator.share({ files: [file], title: 'Happy Birthday Lyka ♡' });
                    }
                    throw new Error('canShare failed');
                })
                .catch(function() {
                    // fallback
                    triggerDownload(src, filename);
                });
        } else {
            triggerDownload(src, filename);
        }
    });

    function triggerDownload(src, filename) {
        var a = document.createElement('a');
        a.href = src;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // ── Sparkles ──
    (function() {
        var wrap = document.querySelector('.stage-wrap');
        wrap.style.position = 'relative';
        var overlay = document.createElement('div');
        overlay.className = 'sparkles';
        for (var i = 0; i < 8; i++) {
            var s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = (Math.random() * 100) + '%';
            s.style.top  = (Math.random() * 100) + '%';
            s.style.animationDelay    = (Math.random() * 3) + 's';
            s.style.animationDuration = (2 + Math.random() * 2) + 's';
            overlay.appendChild(s);
        }
        wrap.appendChild(overlay);
    })();
})();
</script>
</body>
</html>
