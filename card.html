<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A card for you &middot; lyka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --cream: #faf6f1;
        --warm: #f5ede2;
        --blush: #f5e1de;
        --rose: #c4727f;
        --rose-light: #e0a8b0;
        --rose-pale: #f0d4d8;
        --sage: #9aa78f;
        --sage-pale: #d8e0d2;
        --gold: #d4a574;
        --gold-light: #e8c597;
        --text: #4a3f3a;
        --text-light: #7a6a64;
        --text-faint: #b8a8a3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: var(--cream);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }
    body {
        min-height: 100vh; min-height: 100svh;
        background:
            radial-gradient(circle at 18% 12%, var(--blush) 0%, transparent 35%),
            radial-gradient(circle at 82% 88%, #f8d6dc 0%, transparent 38%),
            radial-gradient(circle at 50% 50%, rgba(255,250,245,0.7) 0%, transparent 60%),
            var(--cream);
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem 1rem 5rem;
        position: relative;
    }

    .back-link {
        position: absolute; top: 1.25rem; left: 1.25rem;
        display: inline-flex; align-items: center; gap: 0.4rem;
        font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
        color: var(--text-faint); text-decoration: none;
        transition: color 0.25s ease;
        z-index: 10;
    }
    .back-link:hover { color: var(--rose); }
    .back-link svg { width: 12px; height: 12px; }

    .header {
        text-align: center; margin-bottom: 1.5rem;
        max-width: 360px;
    }
    .label {
        font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase;
        color: var(--sage); margin-bottom: 0.6rem;
    }
    .heading {
        font-family: 'Cormorant Garamond', serif; font-weight: 400;
        font-size: 1.75rem; line-height: 1.25; color: var(--text);
        margin-bottom: 0.5rem;
    }
    .heading em { font-style: italic; color: var(--rose); }
    .sub {
        font-family: 'Cormorant Garamond', serif; font-style: italic;
        font-size: 0.95rem; color: var(--text-light);
    }

    /* ===== CARD STAGE ===== */
    .stage-wrap {
        width: 100%;
        max-width: 360px;
        margin: 1.5rem auto;
        perspective: 2200px;
        perspective-origin: 50% 30%;
    }
    .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 5 / 7;
        transform-style: preserve-3d;
        transition: transform 1.1s cubic-bezier(0.65, 0, 0.35, 1);
        cursor: pointer;
    }

    /* The cover (a flip-card with front + back faces) */
    .cover {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        transform-origin: left center;
        transition: transform 1.1s cubic-bezier(0.65, 0, 0.35, 1);
        z-index: 3;
    }
    .face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        background-color: var(--blush);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px;
        box-shadow:
            0 4px 14px rgba(196, 114, 127, 0.15),
            0 18px 50px rgba(196, 114, 127, 0.18);
    }
    .face.front {
        background-image: url('card-cover.png'), url('card-cover.jpg'), url('card-cover.jpeg');
        transform: rotateY(0);
    }
    .face.back-of-cover {
        /* the inside-left of an open card; we leave this softly themed */
        background:
            linear-gradient(135deg, #fdeef0, #f8e0e6 60%, #fbe8ec);
        transform: rotateY(180deg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    .back-of-cover-text {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        text-align: center;
        color: var(--rose);
        opacity: 0.4;
        font-size: 0.95rem;
        line-height: 1.5;
    }

    /* The inside (blank pink page with cat & lotuses), sitting beneath the cover */
    .inside {
        position: absolute;
        inset: 0;
        background-color: #fbeef0;
        background-image: url('card-back.png'), url('card-back.jpg'), url('card-back.jpeg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px;
        z-index: 2;
        box-shadow:
            inset 8px 0 18px rgba(120, 60, 80, 0.06),
            0 8px 28px rgba(196, 114, 127, 0.12);
    }

    /* The back face (the heartfelt message), shown when whole card flips around */
    .back-face {
        position: absolute;
        inset: 0;
        background-color: #f8d6dc;
        background-image: url('card-inside.png'), url('card-inside.jpg'), url('card-inside.jpeg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 8px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        transform: rotateY(180deg);
        z-index: 1;
        box-shadow:
            0 4px 14px rgba(196, 114, 127, 0.15),
            0 18px 50px rgba(196, 114, 127, 0.18);
    }

    /* Card spine subtle line down the middle when open */
    .spine {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 12px;
        background: linear-gradient(to right,
            rgba(120, 60, 80, 0.10),
            rgba(120, 60, 80, 0.04) 60%,
            transparent);
        z-index: 4;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.6s ease 0.4s;
    }

    /* ===== STATES ===== */
    /* Front (closed): cover at 0, stage not flipped */
    .stage[data-state="front"] .cover { transform: rotateY(0); }
    .stage[data-state="front"] { transform: rotateY(0); }
    .stage[data-state="front"] .spine { opacity: 0; transition-delay: 0s; }

    /* Inside (opened): cover swings open along left hinge */
    .stage[data-state="inside"] .cover { transform: rotateY(-160deg); }
    .stage[data-state="inside"] { transform: rotateY(0); }
    .stage[data-state="inside"] .spine { opacity: 1; }

    /* Closing (transition step from inside → back): cover closes first */
    .stage[data-state="closing"] .cover { transform: rotateY(0); }
    .stage[data-state="closing"] { transform: rotateY(0); }

    /* Back: cover closed, whole card flipped 180 */
    .stage[data-state="back"] .cover { transform: rotateY(0); }
    .stage[data-state="back"] { transform: rotateY(-180deg); }

    /* Re-opening: cover swings back to 0, then card un-flips */
    .stage[data-state="unflip"] .cover { transform: rotateY(0); }
    .stage[data-state="unflip"] { transform: rotateY(0); }

    /* ===== INSTRUCTIONS BUBBLE ===== */
    .hint {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
        color: var(--text-faint);
        min-height: 1.2em;
        transition: opacity 0.4s ease;
    }
    .hint .heart {
        display: inline-block; color: var(--rose); margin: 0 0.2em;
        animation: heartbeat 2s ease-in-out infinite;
    }
    @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.18); }
    }

    /* ===== Sparkles overlay ===== */
    .sparkles {
        position: absolute; inset: 0;
        pointer-events: none;
        overflow: hidden;
    }
    .sparkle {
        position: absolute;
        width: 4px; height: 4px;
        background: var(--rose-light);
        border-radius: 50%;
        opacity: 0;
        animation: sparkle 3s ease-in-out infinite;
    }
    @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* ===== Reset button ===== */
    .reset-btn {
        margin-top: 0.75rem;
        background: none; border: 1px solid var(--rose-pale);
        color: var(--text-light);
        font-family: 'Inter', sans-serif;
        font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
        padding: 0.55rem 1.3rem;
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.25s ease;
    }
    .reset-btn:hover {
        background: var(--rose);
        color: var(--cream);
        border-color: var(--rose);
    }

    /* Page nav */
    .page-nav {
        position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
        display: flex; gap: 0.5rem; z-index: 50;
    }
    .page-dot {
        width: 6px; height: 6px; border-radius: 50%;
        border: 1px solid var(--rose-pale);
        transition: all 0.3s ease;
        display: block;
    }
    .page-dot.active { background: var(--rose); border-color: var(--rose); }
    .page-nav a { line-height: 0; }

    @media (min-width: 768px) {
        .stage-wrap { max-width: 420px; }
        .heading { font-size: 2.1rem; }
    }
</style>
</head>
<body>

<a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    back home
</a>

<div class="header">
    <p class="label">a card for you</p>
    <h1 class="heading">tap to <em>open</em></h1>
    <p class="sub">tap once to open it &middot; tap again for the back</p>
</div>

<div class="stage-wrap">
    <div class="stage" id="stage" data-state="front" role="button" tabindex="0" aria-label="Open the birthday card">
        <!-- The inside page (sits beneath cover, revealed when cover opens) -->
        <div class="inside" aria-hidden="true"></div>

        <!-- Subtle spine shadow at the fold -->
        <div class="spine"></div>

        <!-- The cover: flippable with two faces (front + inside-back) -->
        <div class="cover">
            <div class="face front" aria-hidden="true"></div>
            <div class="face back-of-cover" aria-hidden="true">
                <p class="back-of-cover-text">&mdash; for lyka, with love &mdash;</p>
            </div>
        </div>

        <!-- The back of the entire card -->
        <div class="back-face" aria-hidden="true"></div>
    </div>
</div>

<p class="hint" id="hint">tap the card <span class="heart">&hearts;</span></p>
<button class="reset-btn" id="resetBtn" style="display:none;">close it</button>

<div class="page-nav">
    <a href="index.html"><span class="page-dot"></span></a>
    <a href="globe.html"><span class="page-dot"></span></a>
    <a href="voice-note.html"><span class="page-dot"></span></a>
    <a href="excuses.html"><span class="page-dot"></span></a>
    <span class="page-dot active"></span>
    <a href="newspaper.html"><span class="page-dot"></span></a>
    <a href="video.html"><span class="page-dot"></span></a>
</div>

<script>
(function() {
    'use strict';

    var stage = document.getElementById('stage');
    var hint = document.getElementById('hint');
    var resetBtn = document.getElementById('resetBtn');

    // States: 'front' -> 'inside' -> 'back' -> 'front' (cycle)
    // Transitional states: 'closing' (cover shuts before card flips), 'unflip' (card un-flips before opening)
    var state = 'front';
    var animating = false;
    var DURATION = 1100; // matches CSS transition

    var HINTS = {
        'front': 'tap the card <span class="heart">&hearts;</span>',
        'inside': 'tap again for the back',
        'back': 'tap to start over'
    };

    function setState(s) {
        state = s;
        stage.setAttribute('data-state', s);
        if (HINTS[s]) hint.innerHTML = HINTS[s];
        resetBtn.style.display = (s === 'front') ? 'none' : 'inline-block';
    }

    function advance() {
        if (animating) return;
        if (state === 'front') {
            animating = true;
            setState('inside');
            setTimeout(function() { animating = false; }, DURATION);
        } else if (state === 'inside') {
            // Two-phase: close cover first, then flip
            animating = true;
            stage.setAttribute('data-state', 'closing');
            setTimeout(function() {
                setState('back');
                setTimeout(function() { animating = false; }, DURATION);
            }, DURATION);
            hint.innerHTML = HINTS['back'];
        } else if (state === 'back') {
            // Two-phase: un-flip card first, then open
            animating = true;
            setState('front');
            setTimeout(function() { animating = false; }, DURATION);
        }
    }

    function reset() {
        if (animating) return;
        if (state === 'inside') {
            // close cover
            animating = true;
            setState('front');
            setTimeout(function() { animating = false; }, DURATION);
        } else if (state === 'back') {
            // un-flip
            animating = true;
            setState('front');
            setTimeout(function() { animating = false; }, DURATION);
        }
    }

    stage.addEventListener('click', advance);
    stage.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            advance();
        }
    });
    resetBtn.addEventListener('click', reset);

    // Add some random sparkles around the stage when it first loads
    (function makeSparkles() {
        var n = 8;
        var wrap = document.querySelector('.stage-wrap');
        wrap.style.position = 'relative';
        var overlay = document.createElement('div');
        overlay.className = 'sparkles';
        for (var i = 0; i < n; i++) {
            var s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = (Math.random() * 100) + '%';
            s.style.top = (Math.random() * 100) + '%';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.animationDuration = (2 + Math.random() * 2) + 's';
            overlay.appendChild(s);
        }
        wrap.appendChild(overlay);
    })();
})();
</script>
</body>
</html>
