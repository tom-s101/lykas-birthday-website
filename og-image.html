<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #faf8f5;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-left {
      position: absolute;
      left: -80px; top: 50%;
      transform: translateY(-50%);
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(196,114,127,0.12) 0%, transparent 70%);
    }
    .bg-right {
      position: absolute;
      right: -80px; top: 50%;
      transform: translateY(-50%);
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(212,165,116,0.12) 0%, transparent 70%);
    }

    .corner {
      position: absolute;
      width: 64px; height: 64px;
    }
    .corner-tl { top: 28px; left: 28px; border-top: 1.5px solid rgba(196,114,127,0.35); border-left: 1.5px solid rgba(196,114,127,0.35); }
    .corner-tr { top: 28px; right: 28px; border-top: 1.5px solid rgba(196,114,127,0.35); border-right: 1.5px solid rgba(196,114,127,0.35); }
    .corner-bl { bottom: 28px; left: 28px; border-bottom: 1.5px solid rgba(196,114,127,0.35); border-left: 1.5px solid rgba(196,114,127,0.35); }
    .corner-br { bottom: 28px; right: 28px; border-bottom: 1.5px solid rgba(196,114,127,0.35); border-right: 1.5px solid rgba(196,114,127,0.35); }

    .divider-h {
      position: absolute;
      top: 50%; left: 28px; right: 28px;
      height: 1px;
      background: rgba(196,114,127,0);
    }

    .content {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c4727f;
      margin-bottom: 22px;
      font-weight: 500;
    }

    h1 {
      font-size: 96px;
      font-weight: 500;
      color: #3a3535;
      line-height: 1.05;
      margin-bottom: 28px;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      font-weight: 600;
      background: linear-gradient(135deg, #d4a574 0%, #e8c090 45%, #d4a574 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .heart {
      display: inline-block;
      -webkit-text-fill-color: #c4727f;
      color: #c4727f;
      font-size: 72px;
      line-height: 1;
      vertical-align: middle;
      margin-left: 8px;
      transform: rotate(-8deg) translateY(-8px);
    }

    .subtitle {
      font-size: 24px;
      color: #9a8c8c;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    .dot {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #c4727f;
      margin: 0 10px;
      vertical-align: middle;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="bg-left"></div>
  <div class="bg-right"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="content">
    <div class="eyebrow">a birthday surprise</div>
    <h1>Happy Birthday,<br><em>Lyka</em><span class="heart">♡</span></h1>
    <div class="subtitle">
      <span class="dot"></span>
      a little something made just for you
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
