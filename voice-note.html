<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Lyka — A Voice Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --rose: #c4727f;
    --rose-light: #e8a0aa;
    --rose-pale: #f5dde0;
    --cream: #faf6f1;
    --ink: #0a0a12;
}

html, body {
    height: 100%; min-height: 100svh;
    background: var(--ink);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
}

/* ── Starfield ── */
.starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.star { position: absolute; border-radius: 50%; background: #fff; }
.star.pink { background: var(--rose-light); }
@keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.3); }
}

/* ── Layout ── */
.page {
    position: relative; z-index: 1;
    min-height: 100svh;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 0 0 5rem;
}

/* ── Nav ── */
.topnav {
    width: 100%; display: flex;
    align-items: center; justify-content: space-between;
    padding: 1.2rem 1.4rem;
    position: relative; z-index: 10;
}
.back-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(232,160,170,0.6); text-decoration: none;
    transition: color 0.25s;
}
.back-link:hover { color: var(--rose-light); }
.back-link svg { width: 12px; height: 12px; }
.page-nav { display: flex; gap: 0.5rem; }
.page-dot {
    width: 6px; height: 6px; border-radius: 50%;
    border: 1px solid rgba(196,114,127,0.4); display: block;
    transition: all 0.3s;
}
.page-dot.active { background: var(--rose); border-color: var(--rose); }
.page-nav a { line-height: 0; }

/* ── Header text ── */
.player-header {
    text-align: center;
    padding: 0.5rem 1.5rem 1.25rem;
    max-width: 400px;
    width: 100%;
}
.press-label {
    font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(232,160,170,0.6); margin-bottom: 0.5rem;
}
.main-heading {
    font-family: 'Cormorant Garamond', serif; font-weight: 400;
    font-size: 1.65rem; line-height: 1.25; color: var(--cream);
    margin-bottom: 0.75rem;
}
.main-heading em { color: var(--rose-light); font-style: italic; }
.time-row {
    font-size: 0.7rem; letter-spacing: 2px;
    color: rgba(250,246,241,0.45);
}
.time-sep { margin: 0 0.3em; }

/* ── Player stage ── */
.player-stage {
    position: relative;
    width: 100%; max-width: 500px;
    touch-action: pan-y; /* allow vertical scroll but we'll cancel horizontal in JS */
}

/* ── Photo strip ── */
.strip-viewport {
    width: 100%; height: 185px;
    overflow: hidden;
    /* subtle vignette edges */
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
}
.photo-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 40px;
    height: 100%;
    will-change: transform;
    transition: transform 0.08s linear;
}
.photo-strip.snapping { transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.strip-card {
    flex: 0 0 auto;
    width: 118px;
    background: #fff;
    padding: 5px 5px 22px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.55);
    border-radius: 1px;
    overflow: hidden;
}
.strip-card:nth-child(odd)  { transform: rotate(-1.8deg); }
.strip-card:nth-child(even) { transform: rotate(1.5deg); }
.strip-card img {
    width: 100%; aspect-ratio: 1;
    object-fit: cover; display: block;
}
.strip-empty {
    width: 100%; height: 185px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 1rem; color: rgba(250,246,241,0.2);
}

/* ── Waveform ── */
.waveform-area {
    width: 100%; height: 70px;
    position: relative;
    margin-top: 2px;
}
#waveformCanvas { width: 100%; height: 100%; display: block; }

/* ── Scrubber (absolutely positioned over entire stage) ── */
.scrubber-track {
    position: absolute;
    top: 0;
    /* left controlled by JS */
    height: calc(185px + 2px + 70px); /* strip + gap + wave */
    width: 0;
    pointer-events: none;
    z-index: 20;
}
.scrubber-bar {
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 100%;
    transform: translateX(-1px);
    background: linear-gradient(to bottom,
        rgba(250,246,241,0)   0%,
        rgba(250,246,241,0.5) 6%,
        rgba(250,246,241,0.85) 20%,
        rgba(250,246,241,0.85) 80%,
        rgba(250,246,241,0.5) 94%,
        rgba(250,246,241,0)   100%);
    pointer-events: none;
}
.scrubber-knob {
    position: absolute;
    bottom: -26px;
    left: 0;
    transform: translateX(-50%);
    width: 50px; height: 50px;
    background: var(--rose);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: grab;
    touch-action: none;
    pointer-events: all;
    box-shadow:
        0 4px 16px rgba(196,114,127,0.55),
        0 0 0 3px rgba(196,114,127,0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.scrubber-knob.active {
    transform: translateX(-50%) scale(1.18);
    box-shadow:
        0 6px 24px rgba(196,114,127,0.75),
        0 0 0 8px rgba(196,114,127,0.12);
    cursor: grabbing;
}
.scrubber-knob svg { width: 20px; height: 20px; pointer-events: none; }

/* ── Hold hint ── */
.hold-hint {
    margin-top: 2.4rem;
    font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(232,160,170,0.55);
    text-align: center;
    transition: opacity 0.35s ease;
}

/* ── Empty / loading states ── */
.state-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
}
.empty-icon {
    width: 52px; height: 52px;
    color: rgba(196,114,127,0.35);
    margin-bottom: 1.5rem;
}
.state-heading {
    font-family: 'Cormorant Garamond', serif; font-weight: 400; font-style: italic;
    font-size: 1.5rem; color: var(--cream); margin-bottom: 0.5rem;
}
.state-sub {
    font-size: 0.78rem; color: rgba(250,246,241,0.4); line-height: 1.6;
}
.loading-dots span {
    display: inline-block; width: 6px; height: 6px;
    background: var(--rose-light); border-radius: 50%; margin: 0 3px;
    animation: dot-pulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
    0%,80%,100% { opacity: 0.2; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1.2); }
}

/* ── Footer ── */
.footer {
    position: fixed; bottom: 4.5rem; left: 0; right: 0;
    text-align: center; font-size: 0.65rem;
    color: rgba(250,246,241,0.25); letter-spacing: 1px;
    pointer-events: none;
}
.page-nav-fixed {
    position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
    display: flex; gap: 0.5rem; z-index: 50;
}

/* ── Rose glow behind player ── */
.glow {
    position: fixed;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,114,127,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none; z-index: 0;
}
</style>
</head>
<body>

<div class="starfield" id="starfield"></div>
<div class="glow"></div>

<div class="page" id="page">
    <!-- Top nav -->
    <nav class="topnav">
        <a href="index.html#return" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            back
        </a>
        <div class="page-nav">
            <a href="index.html#return"><span class="page-dot"></span></a>
            <a href="globe.html"><span class="page-dot"></span></a>

        </div>

    <!-- Loading state -->
    <div class="state-screen" id="stateLoading">
        <div class="loading-dots" style="margin-bottom:1rem">
            <span></span><span></span><span></span>
        </div>

    <!-- Empty state -->
    <div class="state-screen" id="stateEmpty" style="display:none">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <h1 class="state-heading">a voice note is on its way…</h1>
        <p class="state-sub">check back soon ♡</p>
    </div>

    <!-- Player (shown when voice note exists) -->
    <div id="statePlayer" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">

        <div class="player-header">
            <p class="press-label">press play</p>
            <h1 class="main-heading">I recorded this <em>just for you</em></h1>
            <div class="time-row">
                <span id="timeCurrent">0:00</span>
                <span class="time-sep">/</span>
                <span id="timeTotal">0:00</span>
            </div>
        </div>

        <!-- Player stage: strip + waveform + scrubber -->
        <div class="player-stage" id="playerStage">

            <!-- Photo filmstrip -->
            <div class="strip-viewport" id="stripViewport">
                <div class="photo-strip" id="photoStrip">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- Waveform canvas -->
            <div class="waveform-area" id="waveformArea">
                <canvas id="waveformCanvas"></canvas>
            </div>

            <!-- Scrubber: bar + knob -->
            <div class="scrubber-track" id="scrubberTrack">
                <div class="scrubber-bar"></div>
                <div class="scrubber-knob" id="scrubberKnob">
                    <svg viewBox="0 0 30 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 25.5C15 25.5 2.5 17.5 2 9.5C1.7 5.5 4.5 2 8.5 2C11.2 2 13.5 3.8 15 6C16.5 3.8 18.8 2 21.5 2C25.5 2 28.3 5.5 28 9.5C27.5 17.5 15 25.5 15 25.5Z" fill="white" stroke="rgba(255,255,255,0.6)" stroke-width="0.5"/>
                    </svg>
                </div>
            </div>
        </div>

        <p class="hold-hint" id="holdHint">hold ♡ to listen · drag to explore</p>
    </div>
</div>

<!-- Fixed page nav dots (duplicate, outside .page for z-index) -->
<div class="page-nav-fixed">
    <a href="index.html#return"><span class="page-dot"></span></a>
    <a href="globe.html"><span class="page-dot"></span></a>
    <span class="page-dot active"></span>
    <a href="excuses.html"><span class="page-dot"></span></a>
    <a href="card.html"><span class="page-dot"></span></a>
    <a href="newspaper.html"><span class="page-dot"></span></a>
</div>

<footer class="footer">made with <span style="color:var(--rose)">♡</span> for lyka</footer>

<script>
(function () {
'use strict';

// ── Supabase config ──
var SB_URL = 'https://vforizrevnrzbzkwtdbc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmb3JpenJldm5yemJ6a3d0ZGJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Mzk4NzIsImV4cCI6MjA5NzUxNTg3Mn0.VchST6lQCv7LrCZc3reuVa0HIpgFsfJ8jfwrRyu6PxQ';

function sbFetch(path) {
    return fetch(SB_URL + path, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
}

// ── Starfield ──
(function () {
    var field = document.getElementById('starfield');
    for (var i = 0; i < 180; i++) {
        var s = document.createElement('div');
        s.className = Math.random() < 0.1 ? 'star pink' : 'star';
        var sz = (Math.random() * 2 + 0.5).toFixed(1) + 'px';
        s.style.cssText =
            'left:' + (Math.random()*100) + '%;' +
            'top:' + (Math.random()*100) + '%;' +
            'width:' + sz + ';height:' + sz + ';' +
            'animation:twinkle ' + (2 + Math.random()*4).toFixed(1) + 's infinite ' + (Math.random()*5).toFixed(1) + 's;';
        field.appendChild(s);
    }
})();

// ── State ──
var audio        = null;
var waveformBars = [];
var fraction     = 0;
var isDragging   = false;
var raf          = null;

// ── Elements ──
var elLoading   = document.getElementById('stateLoading');
var elEmpty     = document.getElementById('stateEmpty');
var elPlayer    = document.getElementById('statePlayer');
var photoStrip  = document.getElementById('photoStrip');
var stripVP     = document.getElementById('stripViewport');
var waveCanvas  = document.getElementById('waveformCanvas');
var scrubTrack  = document.getElementById('scrubberTrack');
var scrubKnob   = document.getElementById('scrubberKnob');
var playerStage = document.getElementById('playerStage');
var holdHint    = document.getElementById('holdHint');
var timeCurrent = document.getElementById('timeCurrent');
var timeTotal   = document.getElementById('timeTotal');

// ── Helpers ──
function fmt(s) {
    if (!s || isNaN(s) || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ── Init ──
async function init() {
    try {
        // Load voice note URL
        var r = await sbFetch('/rest/v1/site_content?key=eq.voice_note_url&select=value');
        var rows = await r.json();
        var vnUrl = rows && rows[0] ? rows[0].value : null;

        if (!vnUrl) { showState('empty'); return; }

        // Load photos in parallel
        var photoUrls = [];
        try {
            var pr = await sbFetch('/rest/v1/lyson_photos?select=photo_url&order=display_order.asc&limit=16');
            var photoRows = await pr.json();
            photoUrls = photoRows.map(function(x) { return x.photo_url; }).filter(Boolean);
        } catch(e) {}

        // Build photo strip
        buildStrip(photoUrls);

        // Set up HTML audio element
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audio.preload = 'auto';

        await new Promise(function(resolve, reject) {
            audio.addEventListener('loadedmetadata', resolve, { once: true });
            audio.addEventListener('error', reject, { once: true });
            audio.src = vnUrl;
        });

        timeTotal.textContent = fmt(audio.duration);

        // Show player
        showState('player');
        setScrubberPos(0);

        // Decode waveform (non-blocking)
        decodeWaveform(vnUrl).then(function(bars) {
            waveformBars = bars;
            drawWaveform(fraction);
        });

        // Audio ended
        audio.addEventListener('ended', function() {
            isDragging = false;
            fraction = 1;
            audio.pause();
            scrubKnob.classList.remove('active');
            holdHint.style.opacity = '1';
            updateUI();
            cancelAnimationFrame(raf);
        });

    } catch(e) {
        console.error(e);
        showState('empty');
    }
}

function showState(s) {
    elLoading.style.display = 'none';
    elEmpty.style.display   = 'none';
    elPlayer.style.display  = 'none';
    if (s === 'loading') elLoading.style.display = 'flex';
    if (s === 'empty')   elEmpty.style.display   = 'flex';
    if (s === 'player')  { elPlayer.style.display = 'flex'; elPlayer.style.flexDirection = 'column'; elPlayer.style.alignItems = 'center'; }
}

// ── Photo strip ──
function buildStrip(urls) {
    photoStrip.innerHTML = '';
    if (!urls.length) {
        var e = document.createElement('div');
        e.className = 'strip-empty';
        e.textContent = '♡';
        stripVP.appendChild(e);
        return;
    }
    urls.forEach(function(url) {
        var card = document.createElement('div');
        card.className = 'strip-card';
        var img = document.createElement('img');
        img.src = url;
        img.alt = '';
        img.draggable = false;
        img.loading = 'lazy';
        card.appendChild(img);
        photoStrip.appendChild(card);
    });
}

function updateStrip(frac) {
    var totalW = photoStrip.scrollWidth;
    var viewW  = stripVP.clientWidth;
    var max = Math.max(0, totalW - viewW);
    photoStrip.style.transform = 'translateX(' + (-frac * max) + 'px)';
}

// ── Waveform ──
async function decodeWaveform(url) {
    var N = 80;
    try {
        var resp = await fetch(url, { mode: 'cors' });
        var buf  = await resp.arrayBuffer();
        var actx = new (window.AudioContext || window.webkitAudioContext)();
        var decoded = await actx.decodeAudioData(buf);
        actx.close();

        var raw = decoded.getChannelData(0);
        var blockSize = Math.floor(raw.length / N);
        var bars = [];
        for (var i = 0; i < N; i++) {
            var sum = 0;
            for (var j = 0; j < blockSize; j++) sum += Math.abs(raw[i * blockSize + j]);
            bars.push(sum / blockSize);
        }
        var max = Math.max.apply(null, bars);
        return bars.map(function(b) { return Math.max(0.05, b / max); });
    } catch(e) {
        return fakeBars(N);
    }
}

function fakeBars(N) {
    var out = [];
    for (var i = 0; i < N; i++) {
        var t = i / N;
        var base = 0.15 + 0.7 * Math.sin(t * Math.PI) * (0.6 + 0.4 * Math.sin(t * Math.PI * 7));
        out.push(Math.max(0.05, Math.min(1, base * (0.65 + Math.random() * 0.35))));
    }
    return out;
}

function drawWaveform(frac) {
    var dpr  = window.devicePixelRatio || 1;
    var W    = waveCanvas.clientWidth;
    var H    = waveCanvas.clientHeight;
    waveCanvas.width  = W * dpr;
    waveCanvas.height = H * dpr;
    var ctx = waveCanvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    if (!waveformBars.length) {
        // Draw placeholder shimmer bars
        waveformBars = fakeBars(80);
    }

    var N    = waveformBars.length;
    var barW = W / N;
    var gap  = barW > 6 ? 1.5 : 1;
    var playX = frac * W;

    waveformBars.forEach(function(h, i) {
        var x   = i * barW;
        var bh  = Math.max(3, h * H * 0.84);
        var by  = (H - bh) / 2;
        var bx  = x + gap;
        var bw  = barW - gap * 2;
        var r   = Math.min(2.5, bw / 2);
        var mid = x + barW / 2;

        ctx.fillStyle = mid < playX ? '#c4727f' : 'rgba(250,246,241,0.13)';
        rrect(ctx, bx, by, bw, bh, r);
        ctx.fill();
    });

    // Soft glow at playhead
    if (frac > 0 && frac < 1) {
        var gx  = frac * W;
        var grd = ctx.createLinearGradient(gx - 10, 0, gx + 10, 0);
        grd.addColorStop(0,   'rgba(232,160,170,0)');
        grd.addColorStop(0.5, 'rgba(232,160,170,0.18)');
        grd.addColorStop(1,   'rgba(232,160,170,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(gx - 10, 0, 20, H);
    }
}

function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ── Scrubber position ──
function setScrubberPos(frac) {
    var x = frac * playerStage.clientWidth;
    scrubTrack.style.left = x + 'px';
}

// ── Full UI update ──
function updateUI() {
    setScrubberPos(fraction);
    updateStrip(fraction);
    drawWaveform(fraction);
    if (audio) {
        timeCurrent.textContent = fmt(audio.currentTime);
    }
}

// ── Animation loop ──
function startLoop() {
    cancelAnimationFrame(raf);
    function tick() {
        if (audio && !audio.paused && !isDragging) {
            fraction = audio.currentTime / (audio.duration || 1);
        }
        updateUI();
        if (isDragging || (audio && !audio.paused)) {
            raf = requestAnimationFrame(tick);
        }
    }
    raf = requestAnimationFrame(tick);
}

// ── Scrubber interaction ──
scrubKnob.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    scrubKnob.setPointerCapture(e.pointerId);
    isDragging = true;
    scrubKnob.classList.add('active');
    holdHint.style.opacity = '0';

    photoStrip.classList.remove('snapping');

    if (audio) audio.play().catch(function(){});
    updateFromEvent(e);
    startLoop();
});

scrubKnob.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    e.preventDefault();
    updateFromEvent(e);
});

function endDrag(e) {
    if (!isDragging) return;
    isDragging = false;
    scrubKnob.classList.remove('active');
    holdHint.style.opacity = '1';
    photoStrip.classList.add('snapping');
    if (audio) audio.pause();
    cancelAnimationFrame(raf);
    updateUI();
}

scrubKnob.addEventListener('pointerup', endDrag);
scrubKnob.addEventListener('pointercancel', endDrag);
scrubKnob.addEventListener('lostpointercapture', endDrag);

function updateFromEvent(e) {
    var rect = playerStage.getBoundingClientRect();
    var x = e.clientX - rect.left;
    fraction = Math.max(0, Math.min(1, x / rect.width));
    if (audio && audio.duration) {
        audio.currentTime = fraction * audio.duration;
        timeCurrent.textContent = fmt(audio.currentTime);
    }
    setScrubberPos(fraction);
    updateStrip(fraction);
    drawWaveform(fraction);
}

// ── Resize ──
window.addEventListener('resize', function() {
    setScrubberPos(fraction);
    drawWaveform(fraction);
});

// ── Boot ──
init();

})();
</script>
</body>
