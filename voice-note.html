<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Lyka — A Voice Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --rose: #c4727f;
    --rose-light: #e8a0aa;
    --rose-pale: #f5dde0;
    --cream: #faf6f1;
    --ink: #0a0a12;
}

html, body {
    height: 100%; min-height: 100svh;
    background: var(--ink);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
}

/* ── Starfield ── */
.starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.star { position: absolute; border-radius: 50%; background: #fff; }
.star.pink { background: var(--rose-light); }
@keyframes twinkle {
    0%,100% { opacity: 0.12; transform: scale(1); }
    50%      { opacity: 0.9;  transform: scale(1.3); }
}

/* ── Page shell ── */
.page {
    position: relative; z-index: 1;
    min-height: 100svh;
    display: flex; flex-direction: column;
    align-items: center;
}

/* ── Nav ── */
.topnav {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 1.4rem;
    flex-shrink: 0;
}
.back-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(232,160,170,0.55); text-decoration: none;
    transition: color 0.25s;
}
.back-link:hover { color: var(--rose-light); }
.back-link svg { width: 12px; height: 12px; }
.page-nav { display: flex; gap: 0.5rem; }
.page-dot {
    width: 6px; height: 6px; border-radius: 50%;
    border: 1px solid rgba(196,114,127,0.4); display: block; transition: all 0.3s;
}
.page-dot.active { background: var(--rose); border-color: var(--rose); }
.page-nav a { line-height: 0; }

/* ── States ── */
.state-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
}
.empty-icon { width: 52px; height: 52px; color: rgba(196,114,127,0.3); margin-bottom: 1.5rem; }
.state-heading {
    font-family: 'Cormorant Garamond', serif; font-weight: 400; font-style: italic;
    font-size: 1.5rem; color: var(--cream); margin-bottom: 0.5rem;
}
.state-sub { font-size: 0.78rem; color: rgba(250,246,241,0.4); line-height: 1.6; }
.loading-dots span {
    display: inline-block; width: 6px; height: 6px;
    background: var(--rose-light); border-radius: 50%; margin: 0 3px;
    animation: dot-pulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
    0%,80%,100% { opacity: 0.2; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1.2); }
}

/* ── Player ── */
#statePlayer {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    align-items: center;
    flex: 1;
    padding-bottom: 5.5rem;
}

.player-header {
    text-align: center; padding: 0.25rem 1.5rem 1rem; width: 100%;
}
.press-label {
    font-size: 0.58rem; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(232,160,170,0.55); margin-bottom: 0.5rem;
}
.main-heading {
    font-family: 'Cormorant Garamond', serif; font-weight: 400;
    font-size: 1.55rem; line-height: 1.3; color: var(--cream);
    margin-bottom: 0.6rem;
}
.main-heading em { color: var(--rose-light); font-style: italic; }
.time-row {
    font-size: 0.68rem; letter-spacing: 2px;
    color: rgba(250,246,241,0.4);
}

/* ── Photo filmstrip ── */
.strip-viewport {
    width: 100%; height: 178px; overflow: hidden;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
}
.photo-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 40px; height: 100%;
    will-change: transform;
    transition: transform 0.12s linear;
}
.strip-card {
    flex: 0 0 auto; width: 115px;
    background: #fff; padding: 5px 5px 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.55); border-radius: 1px;
    overflow: hidden;
}
.strip-card:nth-child(odd)  { transform: rotate(-1.8deg); }
.strip-card:nth-child(even) { transform: rotate(1.5deg); }
.strip-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

/* ── Waveform ── */
.waveform-area { width: 100%; height: 68px; margin-top: 4px; cursor: pointer; }
#waveformCanvas { width: 100%; height: 100%; display: block; }

/* ── Heart player ── */
.heart-player {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    width: 180px; height: 180px;
    margin: 1.2rem auto 0;
    flex-shrink: 0;
}

/* Expanding sonar rings */
.ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(196,114,127,0);
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scale(0.5);
}
.heart-player.playing .ring { animation: ring-sonar 2.4s ease-out infinite; }
.heart-player.playing .ring:nth-child(2) { animation-delay: 0.8s; }
.heart-player.playing .ring:nth-child(3) { animation-delay: 1.6s; }
@keyframes ring-sonar {
    0%   { transform: scale(0.55); border-color: rgba(196,114,127,0.5); }
    100% { transform: scale(1.7);  border-color: rgba(196,114,127,0); }
}

/* Orbiting dots */
.orbit-container {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
}
.heart-player.playing .orbit-container { opacity: 1; }
.orbit-dot {
    position: absolute;
    width: 7px; height: 7px;
    background: var(--rose-light);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform-origin: 0 0;
}
.heart-player.playing .orbit-dot:nth-child(1) { animation: orbit 2.8s linear infinite; }
.heart-player.playing .orbit-dot:nth-child(2) { animation: orbit 2.8s linear infinite 0.7s; }
.heart-player.playing .orbit-dot:nth-child(3) { animation: orbit 2.8s linear infinite 1.4s; }
.heart-player.playing .orbit-dot:nth-child(4) { animation: orbit 2.8s linear infinite 2.1s; }
@keyframes orbit {
    0%   { transform: rotate(0deg)   translateX(72px) translateX(-3.5px) translateY(-3.5px); opacity: 0.9; }
    50%  { opacity: 0.4; }
    100% { transform: rotate(360deg) translateX(72px) translateX(-3.5px) translateY(-3.5px); opacity: 0.9; }
}

/* The heart button itself */
.heart-btn {
    position: relative; z-index: 2;
    width: 84px; height: 84px;
    background: radial-gradient(circle at 40% 38%, #d4808d, #c4727f 60%, #a85b68);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    touch-action: none;
    border: none; outline: none;
    box-shadow:
        0 0 0 5px rgba(196,114,127,0.18),
        0 8px 28px rgba(196,114,127,0.5);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.heart-btn svg { width: 38px; height: 38px; pointer-events: none; }
.heart-player.playing .heart-btn {
    animation: heart-pulse 1.1s ease-in-out infinite;
    box-shadow:
        0 0 0 8px rgba(196,114,127,0.12),
        0 10px 36px rgba(196,114,127,0.7);
}
@keyframes heart-pulse {
    0%,100% { transform: scale(1); }
    45%     { transform: scale(1.1); }
}
.heart-btn:active { transform: scale(0.94); }

/* ── Hold hint ── */
.hold-hint {
    margin-top: 1.4rem;
    font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(232,160,170,0.5);
    text-align: center;
    transition: opacity 0.35s ease;
}

/* ── Fixed nav ── */
.page-nav-fixed {
    position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
    display: flex; gap: 0.5rem; z-index: 50;
}
</style>
</head>

            <!-- Orbiting dots -->

                    <path d="M8.5 6.5C7 8 6 10 6.5 12.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>

<script>
(function() {
'use strict';

var SB_URL = 'https://vforizrevnrzbzkwtdbc.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmb3JpenJldm5yemJ6a3d0ZGJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Mzk4NzIsImV4cCI6MjA5NzUxNTg3Mn0.VchST6lQCv7LrCZc3reuVa0HIpgFsfJ8jfwrRyu6PxQ';
var LYKA_BUCKET = 'lyka-photos';

function sbGet(path) {
    return fetch(SB_URL + path, {
        headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
}
function sbPost(path, body) {
    return fetch(SB_URL + path, {
        method: 'POST',
        headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
}

// ── Starfield ──
(function() {
    var f = document.getElementById('starfield');
    for (var i = 0; i < 180; i++) {
        var s = document.createElement('div');
        s.className = Math.random() < 0.1 ? 'star pink' : 'star';
        var sz = (Math.random() * 2 + 0.5).toFixed(1) + 'px';
        s.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;width:' + sz + ';height:' + sz + ';animation:twinkle ' + (2+Math.random()*4).toFixed(1) + 's infinite ' + (Math.random()*5).toFixed(1) + 's;';
        f.appendChild(s);
    }
})();

// ── Elements ──
var elLoading   = document.getElementById('stateLoading');
var elEmpty     = document.getElementById('stateEmpty');
var elPlayer    = document.getElementById('statePlayer');
var photoStrip  = document.getElementById('photoStrip');
var waveCanvas  = document.getElementById('waveformCanvas');
var waveArea    = document.getElementById('waveformArea');
var heartPlayer = document.getElementById('heartPlayer');
var heartBtn    = document.getElementById('heartBtn');
var holdHint    = document.getElementById('holdHint');
var timeCurrent = document.getElementById('timeCurrent');
var timeTotal   = document.getElementById('timeTotal');

// ── State ──
var audio        = null;
var waveformBars = [];
var isHolding    = false;
var raf          = null;

function fmt(s) {
    if (!s || isNaN(s) || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function showState(s) {
    elLoading.style.display = 'none';
    elEmpty.style.display   = 'none';
    elPlayer.style.display  = 'none';
    if (s === 'loading') elLoading.style.display = 'flex';
    if (s === 'empty')   elEmpty.style.display   = 'flex';
    if (s === 'player')  elPlayer.style.display  = 'flex';
}

// ── Init ──
async function init() {
    try {
        // Voice note URL
        var r = await sbGet('/rest/v1/site_content?key=eq.voice_note_url&select=value');
        var rows = await r.json();
        var vnUrl = rows && rows[0] ? rows[0].value : null;
        if (!vnUrl) { showState('empty'); return; }

        // Lyka's photos from storage bucket
        var photoUrls = [];
        try {
            var pr = await sbPost('/storage/v1/object/list/' + LYKA_BUCKET, {
                prefix: '', limit: 100, offset: 0,
                sortBy: { column: 'created_at', order: 'asc' }
            });
            var pdata = await pr.json();
            photoUrls = (pdata || [])
                .filter(function(f) { return f && f.name && f.name !== '.emptyFolderPlaceholder'; })
                .map(function(f) { return SB_URL + '/storage/v1/object/public/' + LYKA_BUCKET + '/' + encodeURIComponent(f.name); });
        } catch(e) {}

        buildStrip(photoUrls);

        // Set up audio
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audio.preload = 'auto';

        await new Promise(function(resolve, reject) {
            audio.addEventListener('loadedmetadata', resolve, { once: true });
            audio.addEventListener('error', reject, { once: true });
            audio.src = vnUrl;
        });

        timeTotal.textContent = fmt(audio.duration);
        showState('player');
        drawWaveform(0);

        // Decode real waveform async
        decodeWaveform(vnUrl).then(function(bars) {
            waveformBars = bars;
            var frac = audio ? (audio.currentTime / (audio.duration || 1)) : 0;
            drawWaveform(frac);
        });

        audio.addEventListener('ended', function() {
            stopPlaying();
            audio.currentTime = 0;
            drawWaveform(0);
            updateStrip(0);
            timeCurrent.textContent = '0:00';
        });

    } catch(e) {
        console.error(e);
        showState('empty');
    }
}

// ── Photo strip ──
function buildStrip(urls) {
    photoStrip.innerHTML = '';
    urls.forEach(function(url) {
        var card = document.createElement('div');
        card.className = 'strip-card';
        var img = document.createElement('img');
        img.src = url; img.alt = ''; img.draggable = false; img.loading = 'lazy';
        card.appendChild(img);
        photoStrip.appendChild(card);
    });
}

function updateStrip(frac) {
    var vp = photoStrip.parentElement;
    var max = Math.max(0, photoStrip.scrollWidth - vp.clientWidth);
    photoStrip.style.transform = 'translateX(' + (-frac * max) + 'px)';
}

// ── Waveform ──
async function decodeWaveform(url) {
    var N = 80;
    try {
        var resp = await fetch(url, { mode: 'cors' });
        var buf  = await resp.arrayBuffer();
        var actx = new (window.AudioContext || window.webkitAudioContext)();
        var decoded = await actx.decodeAudioData(buf);
        actx.close();
        var raw = decoded.getChannelData(0);
        var blockSize = Math.floor(raw.length / N);
        var bars = [];
        for (var i = 0; i < N; i++) {
            var sum = 0;
            for (var j = 0; j < blockSize; j++) sum += Math.abs(raw[i * blockSize + j]);
            bars.push(sum / blockSize);
        }
        var max = Math.max.apply(null, bars);
        return bars.map(function(b) { return Math.max(0.05, b / max); });
    } catch(e) {
        return fakeBars(N);
    }
}

function fakeBars(N) {
    var out = [];
    for (var i = 0; i < N; i++) {
        var t = i / N;
        var base = 0.15 + 0.7 * Math.sin(t * Math.PI) * (0.6 + 0.4 * Math.sin(t * Math.PI * 7));
        out.push(Math.max(0.05, Math.min(1, base * (0.65 + Math.random() * 0.35))));
    }
    return out;
}

function drawWaveform(frac) {
    var dpr = window.devicePixelRatio || 1;
    var W = waveArea.clientWidth;
    var H = waveArea.clientHeight;
    waveCanvas.width  = W * dpr;
    waveCanvas.height = H * dpr;
    var ctx = waveCanvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    if (!waveformBars.length) waveformBars = fakeBars(80);

    var N = waveformBars.length;
    var barW = W / N;
    var playX = frac * W;

    waveformBars.forEach(function(h, i) {
        var x   = i * barW;
        var bh  = Math.max(3, h * H * 0.84);
        var by  = (H - bh) / 2;
        var bx  = x + 1;
        var bw  = barW - 2;
        var r   = Math.min(2.5, bw / 2);
        var mid = x + barW / 2;
        ctx.fillStyle = mid < playX ? '#c4727f' : 'rgba(250,246,241,0.13)';
        rrect(ctx, bx, by, bw, bh, r);
        ctx.fill();
    });

    // Glow at playhead
    if (frac > 0 && frac < 1) {
        var gx  = frac * W;
        var grd = ctx.createLinearGradient(gx - 12, 0, gx + 12, 0);
        grd.addColorStop(0,   'rgba(232,160,170,0)');
        grd.addColorStop(0.5, 'rgba(232,160,170,0.22)');
        grd.addColorStop(1,   'rgba(232,160,170,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(gx - 12, 0, 24, H);
    }
}

function rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ── Animation loop ──
function startLoop() {
    cancelAnimationFrame(raf);
    function tick() {
        if (!audio) return;
        var frac = audio.currentTime / (audio.duration || 1);
        drawWaveform(frac);
        updateStrip(frac);
        timeCurrent.textContent = fmt(audio.currentTime);
        if (isHolding && !audio.paused) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
}

// ── Hold-to-play ──
function startPlaying() {
    if (!audio || isHolding) return;
    isHolding = true;
    heartPlayer.classList.add('playing');
    holdHint.style.opacity = '0';
    audio.play().catch(function(){});
    startLoop();
}

function stopPlaying() {
    if (!isHolding) return;
    isHolding = false;
    heartPlayer.classList.remove('playing');
    holdHint.style.opacity = '1';
    if (audio) audio.pause();
    cancelAnimationFrame(raf);
    // Draw final waveform state
    if (audio) drawWaveform(audio.currentTime / (audio.duration || 1));
}

// Pointer events on the heart button
heartBtn.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    heartBtn.setPointerCapture(e.pointerId);
    startPlaying();
});
heartBtn.addEventListener('pointerup',     function() { stopPlaying(); });
heartBtn.addEventListener('pointercancel', function() { stopPlaying(); });
heartBtn.addEventListener('lostpointercapture', function() { stopPlaying(); });

// Tap waveform to seek
waveArea.addEventListener('click', function(e) {
    if (!audio || !audio.duration) return;
    var rect = waveArea.getBoundingClientRect();
    var frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.currentTime = frac * audio.duration;
    timeCurrent.textContent = fmt(audio.currentTime);
    drawWaveform(frac);
    updateStrip(frac);
});

window.addEventListener('resize', function() {
    if (audio) drawWaveform(audio.currentTime / (audio.duration || 1));
});

init();
})();
</script>
</body>
